# LLM via OpenRouter API
llm:
  provider: "openrouter"                              # ← modifié
  model: "arcee-ai/trinity-large-preview:free"        # ← modifié
  base_url: "https://openrouter.ai/api/v1"            # ← modifié
  api_key: "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" # ← à remplir
  temperature: 0.1
  max_tokens: 1024

embeddings:
  provider: "ollama"
  model: "bge-m3"  # Changement de "nomic-embed-text" à "bge-m3"
  base_url: "http://localhost:11434"
  batch_size: 32

# RAG Settings
rag:
  chunk_size: 600  # 🔧 Augmenté de 500 à 600 pour plus de contexte
  chunk_overlap: 80  # 🔧 Augmenté de 50 à 100
  top_k: 8
  similarity_threshold: 0.4  # 🔧 REMPLACÉ distance_threshold par similarity_threshold

# Vector Store (ChromaDB local)
vector_store:
  provider: "chromadb"
  persist_directory: "data/vectordb"
  collection_name: "maroclear_knowledge"
  distance_metric: "cosine"  # 🔧 AJOUTÉ pour documentation

  
# Documents sources
documents:
  sources_dir: "data/documents"
  supported_formats: [".pdf"]

# Multi-Agent Settings
multi_agent:
  max_iterations: 10
  timeout_seconds: 30

classification:
  temperature: 0.2        # plus bas que le RAG pour des classifications stables
  max_tokens: 1200        # réponses plus longues (bloc de synthèse inclus)
  history_turns: 6        # nombre de tours d'historique injectés (multi-tours)
  needs_rag_keywords:     # mots-clés qui déclenchent le RAG en complément
    - "procédure"
    - "procedure"
    - "comment"
    - "étapes"
    - "etapes"
    - "règle"
    - "regle"
    - "formulaire"
    - "guide"